<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Socket Room Client</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.4.0/socket.io.js"></script>
</head>
<body>

<h2>Join Room Now</h2>

<input type="text" id="roomId" placeholder="Enter Room ID">
<button onclick="startRoom()">Play</button>

<br><br>

<input type="text" id="guestname" placeholder="guest name">

<ul id="messages"></ul>

<script>
        async function updatebaackendline(data) {
            try {
				const res = await fetch("/tellstones/welcomeplayer", {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify(data)
				});

				if (res.ok) {
					const restone = await res.json();
				} else {
				}
			} catch (err) {
				console.error(err);
			}
        }
</script>

<script>
    const socket = io("http://localhost:9092", {
        transports: ["websocket"]
    });

    socket.on("connect", () => {
        console.log("CONNECTED");
    });

    socket.on("connect_error", (err) => {
        console.log("ERROR:", err);
    });

    socket.on("message", (data) => {
        const li = document.createElement("li");
        li.innerText = data;
        document.getElementById("messages").appendChild(li);
    });

    let data = [];

    socket.on("sessionID", (sessionID) => {
        data = {
            username: document.getElementById("guestname").value,
            session: sessionID
        };
        updatebaackendline(data);
    });

    socket.on("roomJoined", (roomId) => {
        console.log("Joined room:", roomId);
        window.location.href = `/tellstones/room/${roomId}`;
    });

    // 🔹 Start room
    function startRoom() {
        const roomId = document.getElementById("roomId").value;
        socket.emit("startRoom", roomId);
        console.log("Started room:", roomId);
    }

    // 🔹 Send message
    function sendMessage() {
        const msg = document.getElementById("message").value;
        socket.emit("message", msg);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password Preview</title>
    <link rel="stylesheet" href="../css/tellstone-fantasy.css">
    <style>
        .otp-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 0.85rem;
            align-items: end;
        }

        .otp-row .fantasy-btn {
            min-width: 10rem;
        }

        @media (max-width: 640px) {
            .otp-row {
                grid-template-columns: 1fr;
            }

            .otp-row .fantasy-btn {
                min-width: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <main class="auth-layout">
            <section class="auth-copy">
                <div class="eyebrow">Forgot Password</div>
                <h1 class="title-lg">Recover your place in the chamber.</h1>
                <p class="lead">
                    Enter your email, request an OTP, and continue to the reset screen when you are ready.
                </p>
            </section>
            <section class="auth-card panel">
                <div class="eyebrow">Verification</div>
                <h2 class="title-md">Request a ceremonial code</h2>
                <form class="field-stack" action="javascript:void(0);">
                    <label class="field-label">
                        <span>Email</span>
                        <input type="email" placeholder="Enter your registered email">
                    </label>
                    <div class="otp-row">
                        <label class="field-label">
                            <span>OTP</span>
                            <input type="text" placeholder="Enter the one-time code">
                        </label>
                        <button type="button" class="fantasy-btn ghost">Send OTP</button>
                    </div>
                    <button type="button" class="fantasy-btn primary" onclick="window.location.href='./reset-password-preview.html'">Confirm</button>
                </form>
                <p class="text-muted" style="margin-bottom: 0;">
                    Return to
                    <a class="subtle-link" href="/login">Login</a>
                </p>
            </section>
        </main>
    </div>
    <audio data-bgm loop>
        <source src="../audio/bgm.mp3" type="audio/mpeg">
    </audio>
    <script src="../js/tellstone-ui.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password Preview</title>
    <link rel="stylesheet" href="../css/tellstone-fantasy.css">
</head>
<body>
    <div class="page-shell">
        <main class="auth-layout">
            <section class="auth-copy">
                <div class="eyebrow">Reset Password</div>
                <h1 class="title-lg">Forge a new secret phrase.</h1>
                <p class="lead">
                    This preview page is ready for the future password reset flow.
                </p>
            </section>
            <section class="auth-card panel">
                <div class="eyebrow">New Password</div>
                <h2 class="title-md">Choose your next oath</h2>
                <form class="field-stack" action="javascript:void(0);">
                    <label class="field-label">
                        <span>Password</span>
                        <input type="password" placeholder="Enter a new password">
                    </label>
                    <label class="field-label">
                        <span>Confirm Password</span>
                        <input type="password" placeholder="Confirm the new password">
                    </label>
                    <button type="button" class="fantasy-btn primary">Confirm</button>
                </form>
                <p class="text-muted" style="margin-bottom: 0;">
                    Return to
                    <a class="subtle-link" href="/login">Login</a>
                </p>
            </section>
        </main>
    </div>
    <audio data-bgm loop>
        <source src="../audio/bgm.mp3" type="audio/mpeg">
    </audio>
    <script src="../js/tellstone-ui.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            flex-direction: column;
        }

        /* LINE */
        .theline {
            background: blue;
            height: 250px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* LEFT / RIGHT DROP AREAS */
        .side {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
        }

        .left {
            left: 0;
        }

        .right {
            right: 0;
        }

        /* SLOTS */
        .slots {
            display: flex;
            gap: 100px;
            width: 100%;
            align-items: center;
            justify-content: center;
        }

        .slot {
            width: 80px;
            height: 80px;
            border: 2px dashed white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            pointer-events:none;
        }

        /* BAG */
        .bag {
            display: flex;
            width: 100%;
            align-items: top;
            justify-content: center;
            gap: 5px;
            position: absolute;
            bottom: -120px;
            height: 200px;
            transition: gap .3s ease, bottom .3s ease;
        }

        .bag:hover {
            bottom: 10px;
            gap: 40px;
        }

        .stone {
            display: flex;
            width: 150px;
            height: 150px;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: grab;
        }

        .stone:hover .stonevisual {
            height: 170px;
            width: 170px;
            margin-bottom: 30px;
            box-shadow: 0 0 10px rgba(128, 128, 128, .4);
        }

        .stonevisual {
            position: absolute;
            background: #333;
            border-radius: 50%;
            height: 150px;
            width: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 5px 5px 20px rgba(128, 128, 128, .4);
            transition: height .3s, width .3s, margin-bottom .2s, box-shadow .3s;
            color: white;
            font-size: 30px;
        }
    </style>
</head>

<body>
    <div class="theline">
        <div class="side left"></div>
        <div class="side right"></div>

        <div class="slots">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
    </div>

    <div class="bag" id="bag"></div>
    <script>
        async function updatebaackendline() {
            const theline = document.querySelectorAll(".slot .stonevisual");
            const data = [];
            for(let i = 0; i < theline.length; i++){
                data.push({position: i, stoneid: theline[i].textContent})
            }
            try {
				const res = await fetch("/tellstones/settinggame", {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify(data)
				});

				if (res.ok) {
					const restone = await res.json();
					alert(JSON.stringify(restone));
				} else {
					alert(await res.text());
				}
			} catch (err) {
				alert("Network error");
				console.error(err);
			}
        }
    </script>
    <script>
        /* SPAWN STONES */
        const bag = document.getElementById("bag");

        for (let i = 2; i <= 8; i++) {
            const stone = document.createElement("div");
            stone.className = "stone";
            stone.draggable = true;
            stone.id = i;

            stone.innerHTML = `<div class="stonevisual">${i}</div>`;

            bag.appendChild(stone);
        }

        /* DRAG */
        const stones = document.querySelectorAll(".stone");
        stones.forEach(stone => {
            stone.addEventListener("dragstart", function(e) {
                e.dataTransfer.setData("text", stone.id);
            });
        });

        /* DROP AREAS */
        const left = document.querySelector(".left");
        const right = document.querySelector(".right");
        const slots = document.querySelectorAll(".slot");

        [left, right].forEach(side => {
            side.addEventListener("dragover", e => e.preventDefault());
        });

        /* SLOT LOGIC */
        function placeStone(id, side) {
            let index;

            const filled = [...slots].filter(s => s.children.length > 0);

            if (filled.length === 0) {
                index = Math.floor(slots.length / 2);
            } else {
                const mid = Math.floor(slots.length / 2);

                if (side === "left") {
                    for (let i = mid; i >= 0; i--) {
                        if (slots[i].children.length === 0) {
                            index = i;
                            break;
                        }
                    }
                }

                if (side === "right") {
                    for (let i = mid; i < slots.length; i++) {
                        if (slots[i].children.length === 0) {
                            index = i;
                            break;
                        }
                    }
                }
            }

            if (index === undefined) return;

            const stone = document.getElementById(id);
            const visual = stone.querySelector(".stonevisual");

            slots[index].appendChild(visual);

            stone.remove();
            updatebaackendline();
        }

        left.addEventListener("drop", function(e) {
            e.preventDefault();

            const id = e.dataTransfer.getData("text");

            placeStone(id, "left");
        });

        right.addEventListener("drop", function(e) {
            e.preventDefault();

            const id = e.dataTransfer.getData("text");

            placeStone(id, "right");
        });
    </script>
</body>
</html>

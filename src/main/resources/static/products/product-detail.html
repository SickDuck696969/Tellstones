<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
			--yellow: #ffd500;
			--black: #111;
			--gray: #f4f4f4;
			--border: #e5e5e5;
			--danger: #d70000;
			--primary: #007aff;
			--text: #333;
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: 'Inter', 'Segoe UI', sans-serif;
			background-color: #e98000;
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
            height: 100%;
            min-height: 100vh;
			color: var(--text);
			display: flex;
			gap: 0;
			flex-direction: column;
		}
		a { text-decoration: none; color: inherit; }
		.topbar-wrap {
			position: sticky;
			top: 0;
			z-index: 20;
			display: flex;
			flex-direction: column;
		}
		.topbar {
			background-color: #ff9000;
			padding: 14px 22px;
			display: flex;
			justify-content: right;
			align-items: center;
			gap: 14px;
			box-shadow: 0 2px 8px rgba(0,0,0,0.08);
		}
		.topbar .hide {
			transform: translateY(-100%);
		}
		.search {
			flex: 1;
			display: flex;
			align-items: center;
			background: white;
			border-radius: 4px;
			padding: 8px 12px;
			height: 70%;
			width: auto;
			border: 2px solid rgba(255,255,255,0.2);
		}
		.search input {
			border: none;
			outline: none;
			flex: 1;
			font-size: 20px;
			background: transparent;
			height: 100%;
		}
		.nav-actions { padding-right: 0; display: flex; align-items: center; justify-content: flex-end; gap: 10px; font-size: 14px; padding: 0; }
		.nav-pill {
			background: rgba(0,0,0,0.06);
			border-radius: 14px;
			padding: 9px 12px;
			display: inline-flex;
			align-items: center;
			gap: 6px;
			font-weight: 700;
		}
		.location-pill {
			background: #ffe87a;
			border-radius: 18px;
			padding: 10px 14px;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			font-weight: 800;
			border: 1px solid rgba(0,0,0,0.05);
		}
		.menu-bar {
			background: #ff9000;
			height: 40px;
			align-items: center;
			padding: 6px 22px 10px;
			display: flex;
			flex-wrap: wrap;
			gap: 16px;
		}
		.menu-bar a {
			text-decoration: none;
			display: flex;
			align-items: center;
			font-size: 20px;
			font-weight: 400;
			color: #1a1a1a;
		}
		.logo {
			display: flex;
			align-items: center;
			gap: 8px;
			font-weight: 900;
			font-size: 20px;
			color: #000;
		}
		.logo img{
			height: 80px;
    		width: auto;
			object-fit: contain;
		}
		.profile-link div {
			border-radius: 50%; background-color: #c42e0896; height: 55px; width: 55px; padding: auto; align-items: center; justify-content: center; display: flex;
			transition: background-color .2s ease, height .2s ease, width .2s ease;
		}
		.section {
			padding: 0px 100px 0px 100px;
		}
		.profile-link div:hover {
			height: 50px;
			width: 50px;
			background-color: #ff3300;
		}
		.profile-link div svg {
			width: 17px;
			height: 19px;
			transition: width .2s ease, height .2s ease;
		}
		.profile-link div:hover svg {
			width: 23px;
			height: 25px;
		}
        /* ================= PRODUCT DETAIL ================= */

        .container {
            padding: 60px 120px;
        }

        .product-card {
            background: rgb(255, 136, 0);
            border-radius: 12px;
            padding: 40px;
            display: flex;
            gap: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 1px solid #ffd56947;
            height: 100%;
        }

        .product-image img {
            width: 420px;
            height: 420px;
            object-fit: cover;
            border-radius: 16px;
            border: 2px solid #ffe2b3;
            background: #fff7e6;
        }

        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-name {
            font-size: 38px;
            font-weight: 900;
            margin: 0 0 10px;
        }

        .product-price {
            font-size: 30px;
            font-weight: 700;
            color: #222;
            margin-bottom: 20px;
        }

        .product-description {
            font-size: 18px;
            line-height: 1.6;
            background-color: #ff5e009b;
            flex: 1;
        }

        .add-cart-btn {
            background: #18ac22;
            color: #8cff75da;
            border: none;
            padding: 16px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            width: 260px;
            transition: 0.2s;
        }

        .add-cart-btn:hover {
            transform: scale(1.05);
        }

    </style>
</head>

<body>

<!-- ================= TOP WRAP (UNCHANGED) ================= -->
<div class="topbar-wrap">
		<header class="topbar" style="height: 60px;">
			<div class="nav-actions" style="width: 200px;">
				<button class="profile-link" style="background: transparent; border: none; cursor: pointer; margin: 0; margin-left: auto; width: 55px; height: 55px; justify-items: center;">
					<div>
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 17 19" fill="none" aria-hidden="true" class="innericon">
							<circle cx="8.5" cy="5.8125" r="4.625" stroke="#fff" stroke-width="2"></circle>
							<path d="M16 18C16 13.8579 12.6421 10.5 8.5 10.5C4.35786 10.5 1 13.8579 1 18" stroke="#fff" stroke-width="2" stroke-linecap="round"></path>
						</svg>
					</div>
				</button>
			</div>
			
		</header>
		<nav class="menu-bar" style="height: 90px;">
			<a class="logo" href="/products">
				<img src="/buyhub.png">
			</a>
			<div class="search" style="width: 0px;">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
				<input type="search" placeholder="Mở bán vivo Y31d" />
			</div>
			<div style="height: 100%; width: 50px; justify-content: center; align-items: center; display: flex;">
				<a href="#">
					<svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<circle cx="9" cy="21" r="1.5"></circle>
						<circle cx="18" cy="21" r="1.5"></circle>
						<path d="M1 1h4l2.68 12.39a2 2 0 0 0 2 1.61h7.72a2 2 0 0 0 2-1.61L23 6H6"></path>
					</svg>
				</a>
			</div>
		</nav>
	</div>
	<script>
		const header = document.querySelector(".topbar");
		const nav = document.querySelector(".menu-bar");

		let currentY = 0;
		let targetY = 0;

		function lerp(start, end, t) {
		return start + (end - start) * t;
		}

		window.addEventListener("wheel", (e) => {
		if (e.deltaY > 0) {
			targetY = -60;
		} else {
			targetY = 0;
		}
		});

		function animate() {
		currentY = lerp(currentY, targetY, 0.1);
		header.style.transform = `translateY(${currentY}px)`;
		nav.style.transform = `translateY(${currentY}px)`;
		requestAnimationFrame(animate);
		}

		animate();
	</script>

<!-- ================= PRODUCT DETAIL ================= -->

<main class="container">

    <div class="product-card">

        <div class="product-image">
            <img id="product-image" src="" alt="">
        </div>

        <div class="product-info">
            <div style="height: 100%;">
                <h1 class="product-name" id="product-name"></h1>
                <div class="product-price" id="product-price"></div>
                <div class="product-description" id="product-description"></div>
            </div>

            <button class="add-cart-btn" id="add-to-cart">
                ADD TO CART
            </button>
        </div>

    </div>

</main>

<!-- ================= SCRIPT ================= -->

<script>
    // Get product ID from URL
    const productId = window.location.pathname.split("/").pop();

    async function loadProduct() {
        const res = await fetch("/tellstones/getplayers/" + productId);

        if (!res.ok) {
            alert("Product not found");
            return;
        }

        const product = await res.json();

        alert(JSON.stringify(product));
    }

    document.getElementById("add-to-cart").addEventListener("click", async () => {
        const res = await fetch("/products/add/" + productId, {
            method: "POST"
        });

        if (res.ok) {
            alert("Added to cart!");
        } else {
            alert("Failed to add to cart");
        }
    });

    window.onload = loadProduct;
</script>

</body>
</html>

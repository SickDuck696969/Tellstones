<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${pageTitle} ?: 'Sản phẩm'">Sản phẩm</title>
	<style>
		:root {
			--yellow: #ffd500;
			--black: #111;
			--gray: #f4f4f4;
			--border: #e5e5e5;
			--danger: #d70000;
			--primary: #007aff;
			--text: #333;
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: 'Inter', 'Segoe UI', sans-serif;
			background-color: #e98000;
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
            height: 100%;
            min-height: 100vh;
			color: var(--text);
			display: flex;
			gap: 0;
			flex-direction: column;
		}
		a { text-decoration: none; color: inherit; }
		.topbar-wrap {
			position: sticky;
			top: 0;
			z-index: 20;
			display: flex;
			flex-direction: column;
		}
		.topbar {
			background-color: #ff9000;
			padding: 14px 22px;
			display: flex;
			justify-content: right;
			align-items: center;
			gap: 14px;
			box-shadow: 0 2px 8px rgba(0,0,0,0.08);
		}
		.topbar .hide {
			transform: translateY(-100%);
		}
		.search {
			flex: 1;
			display: flex;
			align-items: center;
			background: white;
			border-radius: 4px;
			padding: 8px 12px;
			height: 70%;
			width: auto;
			border: 2px solid rgba(255,255,255,0.2);
		}
		.search input {
			border: none;
			outline: none;
			flex: 1;
			font-size: 20px;
			background: transparent;
			height: 100%;
		}
		.nav-actions { padding-right: 0; display: flex; align-items: center; justify-content: flex-end; gap: 10px; font-size: 14px; padding: 0; }
		.nav-pill {
			background: rgba(0,0,0,0.06);
			border-radius: 14px;
			padding: 9px 12px;
			display: inline-flex;
			align-items: center;
			gap: 6px;
			font-weight: 700;
		}
		.location-pill {
			background: #ffe87a;
			border-radius: 18px;
			padding: 10px 14px;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			font-weight: 800;
			border: 1px solid rgba(0,0,0,0.05);
		}
		.menu-bar {
			background: #ff9000;
			height: 40px;
			align-items: center;
			padding: 6px 22px 10px;
			display: flex;
			flex-wrap: wrap;
			gap: 16px;
		}
		.menu-bar a {
			text-decoration: none;
			display: flex;
			align-items: center;
			font-size: 20px;
			font-weight: 400;
			color: #1a1a1a;
		}
		.logo {
			display: flex;
			align-items: center;
			gap: 8px;
			font-weight: 900;
			font-size: 20px;
			color: #000;
		}
		.logo img{
			height: 80px;
    		width: auto;
			object-fit: contain;
		}
		.profile-link div {
			border-radius: 50%; background-color: #c42e0896; height: 55px; width: 55px; padding: auto; align-items: center; justify-content: center; display: flex;
			transition: background-color .2s ease, height .2s ease, width .2s ease;
		}
		.section {
			padding: 0px 100px 0px 100px;
		}
		.profile-link div:hover {
			height: 50px;
			width: 50px;
			background-color: #ff3300;
		}
		.profile-link div svg {
			width: 17px;
			height: 19px;
			transition: width .2s ease, height .2s ease;
		}
		.profile-link div:hover svg {
			width: 23px;
			height: 25px;
		}
		/* Cart item card */
		.cart-item {
			display: flex;
			flex-direction: row;
			gap: 12px;
			align-items: center;
			background: rgb(255, 136, 0);
			border-radius: 4px;
			padding: 12px;
			border: 1px solid #ffd56947;
			box-shadow: 0 6px 16px rgba(0,0,0,0.08);
			transition: transform .15s ease, box-shadow .15s ease;
		}

		.cart-item:hover {
			transform: translateY(-3px);
			box-shadow: 0 12px 26px rgba(0,0,0,0.15);
		}

		/* Product image */
		.cart-item img {
			width: 110px;
			height: 110px;
			object-fit: cover;
			border-radius: 10px;
		}

		/* Details block */
		.item-details {
			display: flex;
			flex-direction: row;
			gap: 4px;
			flex: 1;
			height: 110px;
			align-content: center;
			margin: 0;
		}

		/* Product name */
		.item-name {
			margin: 0;
			font-size: 17px;
			font-weight: 500;
			color: #222222b7;
			flex: 1;
			height: 100%;
			align-content: center;
		}

		/* Price & quantity */
		.item-price{
			margin: 0;
			font-size: 17px;
			color: #555;
			flex: 1;
			height: 100%;
			align-content: center;
		}

		.item-quantity{
			margin: 0;
			font-size: 17px;
			color: #555;
			flex: 1;
			height: 100%;
			align-content: center;
		}
		/* Floating buy button */
		.buy-sticky {
			position: absolute;
			right: 24px;
			bottom: 24px;
			background: #18ac22;
			color: #8cff75da;
			border: none;
			padding: 16px 26px;
			font-size: 22px;
			font-weight: 900;
			letter-spacing: .5px;
			cursor: pointer;
			transition: transform .15s ease;
			z-index: 999;
			width: 250px;
			height: fit-content;
		}

		.buy-sticky:hover {
			transform: translateY(-3px) scale(1.03);
		}

		.buy-sticky:active {
			transform: translateY(0) scale(.98);
		}
	</style>
</head>
<body>
	<div class="topbar-wrap">
		<header class="topbar" style="height: 60px;">
			<div class="nav-actions" style="width: 200px;">
				<button class="profile-link" style="background: transparent; border: none; cursor: pointer; margin: 0; margin-left: auto; width: 55px; height: 55px; justify-items: center;">
					<div>
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 17 19" fill="none" aria-hidden="true" class="innericon">
							<circle cx="8.5" cy="5.8125" r="4.625" stroke="#fff" stroke-width="2"></circle>
							<path d="M16 18C16 13.8579 12.6421 10.5 8.5 10.5C4.35786 10.5 1 13.8579 1 18" stroke="#fff" stroke-width="2" stroke-linecap="round"></path>
						</svg>
					</div>
				</button>
			</div>
			
		</header>
		<nav class="menu-bar" style="height: 90px;">
			<a class="logo" href="/products">
				<img src="/buyhub.png">
			</a>
			<div class="search" style="width: 0px;">
				<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
				<input type="search" placeholder="Mở bán vivo Y31d" />
			</div>
			<div style="height: 100%; width: 50px; justify-content: center; align-items: center; display: flex;">
				<a href="#">
					<svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<circle cx="9" cy="21" r="1.5"></circle>
						<circle cx="18" cy="21" r="1.5"></circle>
						<path d="M1 1h4l2.68 12.39a2 2 0 0 0 2 1.61h7.72a2 2 0 0 0 2-1.61L23 6H6"></path>
					</svg>
				</a>
			</div>
		</nav>
	</div>
	<script>
		const header = document.querySelector(".topbar");
		const nav = document.querySelector(".menu-bar");

		let currentY = 0;
		let targetY = 0;

		function lerp(start, end, t) {
		return start + (end - start) * t;
		}

		window.addEventListener("wheel", (e) => {
		if (e.deltaY > 0) {
			targetY = -60;
		} else {
			targetY = 0;
		}
		});

		function animate() {
		currentY = lerp(currentY, targetY, 0.1);
		header.style.transform = `translateY(${currentY}px)`;
		nav.style.transform = `translateY(${currentY}px)`;
		requestAnimationFrame(animate);
		}

		animate();
	</script>

	<main class="section">
		<div class="section-title">
		</div>
		<h1 style="font-weight: 900;">CART</h1>
		<div id="cart-items" class="grid">
			
		</div>
		<div style="background-color: rgb(255, 136, 0); height: 210px; right: 100px; left: 100px; bottom: 0; position: fixed; align-self: center;">
			<div style="display: grid;grid-template-columns: 1fr 1fr;gap: 10px;margin-left:auto; padding-left: 100px; padding-top: 100px;">
				<p>total:</p>
				<p id="total">amount</p>
				<p>storecredit:</p>
				<div style="display: flex; flex-direction: row;">
					<button id="credit" style="background: transparent; outline: none; border: none; width: fit-content; height: fit-content; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; color: #333;" id="storecredit">
						10000
					</button>
				</div>
			</div>
			<button class="buy-sticky">
				CHECK OUT
			</button>
		</div>
	</main>

	<script>
		async function handleProfileClick() {
			const res = await fetch("/login/dashboard");

			if (res.ok) {
				const acc = await res.json();
				const credit = document.getElementById("credit");
				credit.textContent = acc.credit;
			} else {
				window.location.href = "/login/Login";
			}
		}

		
	</script>

	<script>
				async function loadCart() {
					const res = await fetch("/products/pullcart");
					const total = document.getElementById("total");
					if (!res.ok) {
						const m = await res.text();
						alert(m);
						return;
					}
					const cart = await res.json();
					const cartContainer = document.getElementById("cart-items");
					let to = 0;
					cart.forEach(item => {
						let a = cartContainer.querySelector(`#item-${item.product.id}`);
						if (a) {
							a.querySelector(".item-quantity").textContent = `quantity: ${parseInt(a.querySelector(".item-quantity").textContent.split(": ")[1]) + 1}`;
							total.textContent = `${parseInt(total.textContent.split("₫")[0]) + item.product.price}đ`; 
							return;
						}else{
							
						}
						const itemElement = document.createElement("div");
						itemElement.className = "cart-item";
						itemElement.innerHTML = `
							<img src="${item.product.image_string}" alt="${item.product.name}">
							<div class="item-details" id="item-${item.product.id}">
								<div class="item-name">
									<p>${item.product.name}</p>
								</div>
								<div class="item-price">
									<p>${item.product.price}đ</p>
								</div>
								<div class="item-quantity">
									<p>quantity: 1</p>
								</div>
							</div>
						`;
						cartContainer.appendChild(itemElement);
						to += item.product.price;
						total.textContent = `${to}₫`;
						credit.textContent = `${item.account.credit}₫`;
					});
				}

				window.onload = () => {
					loadCart();
					document.querySelector(".profile-link")
						.addEventListener("click", handleProfileClick);
				};
	</script>
	<script>
		document.querySelector(".buy-sticky").addEventListener("click", async () => {
			const res = await fetch("/products/placeorder", {
				method: "POST"
			});
			if (res.ok) {
				alert("Order placed successfully!");
				window.location.reload();
			} else {
				let m = await res.text();
				alert(m);
			}
		});	
	</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coin Flip</title>
<style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        background: #1e1e2f;
        color: white;
    }

    .coin {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: gold;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: bold;
        transform-style: preserve-3d;
        transition: transform 1s;
    }

    .flip {
        animation: flip 1s ease-in-out;
    }

    @keyframes flip {
        0% { transform: rotateY(0); }
        100% { transform: rotateY(1080deg); }
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background: #4CAF50;
        color: white;
    }
</style>
</head>
<body>

<div id="coin" class="coin">?</div>
<button onclick="flipCoin()">Flip Coin</button>

<script>
function flipCoin() {
    const coin = document.getElementById("coin");

    coin.classList.remove("flip");
    void coin.offsetWidth; // restart animation
    coin.classList.add("flip");

    setTimeout(() => {
        const result = Math.random() < 0.5 ? "Heads" : "Tails";
        coin.textContent = result;
    }, 500);
}
</script>

</body>
</html>

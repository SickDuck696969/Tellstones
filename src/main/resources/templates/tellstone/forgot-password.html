<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password</title>

    <link rel="stylesheet" th:href="@{/css/tellstone-fantasy.css}">

    <style>
        .otp-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 0.85rem;
            align-items: end;
        }

        .otp-row .fantasy-btn {
            min-width: 10rem;
        }

        @media (max-width: 640px) {
            .otp-row {
                grid-template-columns: 1fr;
            }

            .otp-row .fantasy-btn {
                min-width: 0;
                width: 100%;
            }
        }
    </style>
</head>

<body>
<div class="page-shell">
    <main class="auth-layout">

        <!-- LEFT TEXT -->
        <section class="auth-copy">
            <div class="eyebrow">Forgot Password</div>
            <h1 class="title-lg">Recover your place in the chamber.</h1>
            <p class="lead">
                Enter your email, request an OTP, and continue to the reset screen when you are ready.
            </p>
        </section>

        <!-- FORM -->
        <section class="auth-card panel">
            <div class="eyebrow">Verification</div>
            <h2 class="title-md">Request a ceremonial code</h2>

            <form class="field-stack" onsubmit="return false;">
                <!-- EMAIL -->
                <label class="field-label">
                    <span>Email</span>
                    <input id="email" type="email" placeholder="Enter your registered email" required>
                </label>

                <!-- OTP + BUTTON -->
                <div class="otp-row">
                    <label class="field-label">
                        <span>OTP</span>
                        <input id="otp" type="text" placeholder="Enter the one-time code">
                    </label>

                    <button type="button" class="fantasy-btn ghost" onclick="sendOtp(this)">
                        Send OTP
                    </button>
                </div>

                <!-- CONFIRM -->
                <button type="button" class="fantasy-btn primary" onclick="verifyOtp(this)">
                    Confirm
                </button>
            </form>

            <p class="text-muted" style="margin-bottom: 0;">
                Return to
                <a class="subtle-link" href="/login">Login</a>
            </p>
        </section>

    </main>
</div>

<!-- AUDIO -->
<audio data-bgm loop>
    <source th:src="@{/audio/bgm.mp3}" type="audio/mpeg">
</audio>

<script th:src="@{/js/tellstone-ui.js}"></script>

<!-- 🔥 OTP LOGIC -->
<script>
async function sendOtp(button) {
    const email = document.getElementById("email").value;

    if (!email) {
        alert("Please enter your email");
        return;
    }

    button.innerText = "Sending...";
    button.disabled = true;

    try {
        const response = await fetch("/Reset", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: new URLSearchParams({ email })
        });

        const result = await response.json();
        alert(result.message);

    } catch (error) {
        alert("Error sending OTP");
    }

    button.innerText = "Send OTP";
    button.disabled = false;
}

async function verifyOtp(button) {
    const email = document.getElementById("email").value;
    const otp = document.getElementById("otp").value;

    if (!email || !otp) {
        alert("Please fill all fields");
        return;
    }

    button.innerText = "Verifying...";
    button.disabled = true;

    try {
        const response = await fetch("/verify-otp", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: new URLSearchParams({ email, otp })
        });

        const result = await response.json();

        if (result.status === "ok") {
            alert("OTP verified!");

            // redirect AFTER success
            window.location.href = "/reset-password?email=" + encodeURIComponent(email);

        } else {
            alert(result.message);
        }

    } catch (error) {
        alert("Error verifying OTP");
    }

    button.innerText = "Confirm";
    button.disabled = false;
}
</script>

</body>
</html>

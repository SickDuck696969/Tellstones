<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>

    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <title>Tellstones Battle Chamber</title>
    <style>

        .room-shell { position: relative; min-height: 100vh; padding: 5.2rem 1rem 1rem; }
        .battlefield { position: relative; display: grid; grid-template-columns: 300px minmax(0, 1fr); gap: 1rem; width: min(1500px, 100%); height: calc(100vh - 6.2rem); margin: 0 auto; }

        .chat-head { position: relative; z-index: 1; margin-bottom: .9rem; }

        .chat-form input { width: 100%; margin-top: .4rem; border: 1px solid rgba(223,193,125,.16); border-radius: 1rem; background: rgba(19,14,11,.88); color: #eadfca; padding: .95rem 1rem; font: inherit; }
        .chat-actions { display: flex; gap: .65rem; }

        .room-id-badge { position: absolute; z-index: 8; padding: .45rem .75rem; border-radius: 999px; border: 1px solid rgba(223,193,125,.16); background: rgba(10,8,7,.74); box-shadow: 0 16px 30px rgba(0,0,0,.22); }
        .room-id-badge { top: 1rem; left: 1rem; font-family: "Cinzel", serif; font-size: .72rem; letter-spacing: .08em; text-transform: uppercase; color: #c8b89a; }
        .playerbox { position: absolute; inset: 0; pointer-events: none; z-index: 6; }
        .player-rail { position: absolute; right: 2rem; left: auto; transform: none; display: flex; align-items: flex-end; gap: .7rem; width: 385px; justify-content: flex-end; }
        .player-rail.top { top: .95rem; }
        .player-rail.bottom { bottom: 1.15rem; }
        .player-stack { display: grid; gap: .4rem; width: 250px; }
        .score-track { display: inline-flex; align-items: center; justify-content: center; gap: .35rem; width: fit-content; margin-left: auto; padding: .35rem .6rem; border-radius: 999px; border: 1px solid rgba(223,193,125,.16); background: rgba(10,8,7,.74); box-shadow: 0 12px 22px rgba(0,0,0,.2); }
        .score-orb { width: .55rem; height: .55rem; border-radius: 50%; background: rgba(223,193,125,.16); border: 1px solid rgba(223,193,125,.26); box-shadow: inset 0 0 6px rgba(0,0,0,.24); }
        .score-orb.lit { background: radial-gradient(circle at 35% 35%, rgba(255,249,220,.95), rgba(223,193,125,.92) 58%, rgba(185,147,79,.7) 100%); box-shadow: 0 0 10px rgba(223,193,125,.45); }
        .player-card { display: flex; align-items: center; gap: .75rem; min-width: 240px; max-width: 290px; padding: .65rem .8rem; border-radius: 1.2rem; border: 1px solid rgba(223,193,125,.14); background: linear-gradient(180deg, rgba(64,44,31,.78), rgba(20,15,12,.9)); box-shadow: 0 18px 34px rgba(0,0,0,.26); pointer-events: auto; }
        .player-card.opponent { background: linear-gradient(180deg, rgba(44,31,31,.76), rgba(17,13,11,.92)); }
        .player-card.active {
            display: flex;
            align-items: center;
            gap: .75rem;
            min-width: 240px;
            max-width: 290px;
            padding: .65rem .8rem;
            border-radius: 1.2rem;

                rgba(120, 85, 40, 0.95),

        .player-avatar { width: 3.3rem; height: 3.3rem; border-radius: 50%; overflow: hidden; border: 2px solid rgba(223,193,125,.4); background: rgba(255,255,255,.06); flex: 0 0 auto; }
        .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .player-name { margin: 0; font-family: "Cinzel", serif; font-size: .92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-subtitle { margin: .08rem 0 0; color: rgba(234,223,202,.7); font-size: .82rem; }
        .spirit-wrap { display: grid; align-items: center; justify-items: center; gap: .45rem; width: 90px; padding: .55rem .45rem; border-radius: 1.1rem; border: 1px solid rgba(223,193,125,.14); background: rgba(12,10,8,.52); flex: 0 0 auto; }
        .spirit-sprite { position: relative; width: 3.3rem; height: 3.3rem; border-radius: .9rem; background: radial-gradient(circle at 35% 32%, rgba(255,255,255,.36), transparent 22%), radial-gradient(circle at center, rgba(185,147,79,.44), rgba(74,31,31,.18) 60%, transparent 70%); border: 1px solid rgba(223,193,125,.22); box-shadow: 0 0 18px rgba(185,147,79,.18); animation: spiritFloat 3.4s ease-in-out infinite; }
        .spirit-sprite::before { content: ""; position: absolute; width: 1.05rem; height: 1.05rem; left: .75rem; top: .65rem; border-radius: 50%; background: rgba(255,240,205,.85); box-shadow: 0 0 0 .22rem rgba(223,193,125,.12), 0 0 14px rgba(255,240,205,.36); animation: spiritBlink 1.8s ease-in-out infinite; }
        .spirit-sprite::after { content: ""; position: absolute; width: 1.55rem; height: .72rem; left: .7rem; bottom: .52rem; border-radius: 50%; background: rgba(223,193,125,.28); }
        .spirit-label { font-family: "Cinzel", serif; font-size: .58rem; letter-spacing: .07em; text-transform: uppercase; color: #c8b89a; text-align: center; }
        .board-shell { position: absolute; left: calc(50% - 3rem); top: 50%; transform: translate(-50%, -50%); width: min(980px, calc(100% - 10rem)); height: min(380px, calc(100% - 18rem)); border-radius: 2rem; overflow: hidden; border: 1px solid rgba(223,193,125,.16); background: linear-gradient(180deg, rgba(17,13,11,.26), rgba(17,13,11,.38)), radial-gradient(circle at center, rgba(223,193,125,.08), transparent 38%), var(--room-board-texture) center/cover no-repeat; box-shadow: inset 0 0 80px rgba(0,0,0,.42), 0 24px 50px rgba(0,0,0,.28); z-index: 4; }
        .board-shell::before { content: ""; position: absolute; inset: 1rem; border-radius: 1.35rem; border: 1px solid rgba(223,193,125,.12); pointer-events: none; }
        .board-shell::after { content: ""; position: absolute; left: 50%; top: 1rem; bottom: 1rem; width: 1px; transform: translateX(-50%); background: linear-gradient(180deg, transparent, rgba(223,193,125,.18), transparent); pointer-events: none; }
        .theline { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
        .side { position: absolute; top: 0; height: 100%; width: 50%; z-index: 2; transition: all 0.3s ease;}
        .left { left: 0; }
        .right { right: 0; }
        .chosen { background: rgba(247, 156, 11, 0.27);}
        .chosen:hover { background: rgba(247, 157, 11, 0.138);}
        .slots { position: relative; z-index: 3; display: flex; gap: clamp(.35rem, 1vw, .8rem); width: min(860px, calc(100% - 5rem)); align-items: center; justify-content: center; pointer-events:none;}
        .slot { width: clamp(72px, 8vw, 106px); height: clamp(72px, 8vw, 106px); position: relative; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px dashed rgba(234,223,202,.46); background: radial-gradient(circle at center, rgba(255,255,255,.12), transparent 62%), rgba(11,9,8,.36); box-shadow: inset 0 0 24px rgba(0,0,0,.25); pointer-events:none;}
        .slot::before { content: ""; position: absolute; inset: .45rem; border-radius: 50%; border: 1px solid rgba(223,193,125,.1); pointer-events:none;}
        .bag { display: flex; width: min(820px, calc(100% - 20rem)); align-items: flex-end; justify-content: center; gap: .28rem; position: absolute; left: calc(50% - 10.5rem); transform: translateX(-50%); bottom: -1.1rem; height: 9.5rem; transition: gap .28s ease, bottom .28s ease; z-index: 30; }
        .bag:not(.pause):hover { bottom: .9rem; gap: .72rem; }
        .bag::before { content: ""; position: absolute; left: 50%; bottom: 3rem; transform: translateX(-50%); width: min(900px, 100%); height: 6rem; border-radius: 999px; filter: blur(8px); pointer-events: none; }
        .bag.pause, .stone.pause { user-select: none; }
        .stone { display: flex; width: clamp(88px, 8vw, 116px); height: clamp(88px, 8vw, 116px); align-items: center; justify-content: center; position: relative; cursor: grab; }
        .stone:not(.pause):hover .stonevisual { transform: translateY(-.7rem) scale(1.07); box-shadow: 0 24px 30px rgba(0,0,0,.24), 0 0 24px rgba(223,193,125,.18); }
        .stonevisual { position: absolute; width: clamp(80px, 7.2vw, 104px); height: clamp(80px, 7.2vw, 104px); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 36% 28%, rgba(255,255,255,.18), transparent 24%), radial-gradient(circle at center, rgba(255,255,255,.06), transparent 58%), rgba(31,23,18,.94); border: 2px solid rgba(223,193,125,.36); box-shadow: inset 0 0 24px rgba(255,255,255,.06), 0 14px 24px rgba(0,0,0,.28); transition: transform .22s ease, box-shadow .24s ease; overflow: hidden; user-select: none;}
        .stonevisual::before { content: ""; position: absolute; inset: .55rem; border-radius: 50%; background-image: var(--stone-face); background-position: center; background-repeat: no-repeat; background-size: contain; }
        .stonevisual::after { content: ""; position: absolute; inset: .25rem; border-radius: 50%; border: 1px solid rgba(223,193,125,.16); }
        .stonevisual.hiden img{
            display: none;
        }
        .stonevisual.chosen {
            background:
                radial-gradient(circle at 36% 28%, rgba(255, 235, 170, 0.6), transparent 25%),
                radial-gradient(circle at center, rgba(255, 215, 120, 0.25), transparent 60%),
                rgba(120, 85, 20, 0.95);

            border: 2px solid rgba(255, 215, 120, 0.8);

            box-shadow:
                inset 0 0 28px rgba(255, 230, 150, 0.35),
                0 0 18px rgba(255, 215, 120, 0.6),
                0 0 36px rgba(255, 200, 80, 0.45),
                0 14px 24px rgba(0, 0, 0, 0.35);
            pointer-events: inherit;
        }
        .stone-id { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
        .action-dock { position: absolute; right: 2.1rem; top: 51%; transform: translateY(-50%); z-index: 25; display: flex; align-items: center; justify-content: center; width: 4.3rem; height: 4.3rem;}
        .action-trigger { transition: border-radius 1s ease; display: inline-flex; align-items: center; justify-content: center; width: 4.3rem; height: 4.3rem; border-radius: 1.35rem; border: 1px solid rgba(223,193,125,.18); background: linear-gradient(180deg, rgba(79,55,40,.86), rgba(24,18,15,.94)); color: #eadfca; font-family: "Cinzel", serif; font-size: .82rem; letter-spacing: .08em; text-transform: uppercase; box-shadow: 0 18px 28px rgba(0,0,0,.24); cursor: pointer;}
        .action-trigger:hover {border-radius: 50%;}
        .action-panel { position: absolute; right: calc(100% + .65rem); top: 50%; transform: translateY(-50%) translateX(1rem) scale(.96); transform-origin: right center; display: grid; grid-template-columns: repeat(2, minmax(110px, 1fr)); gap: .55rem; width: 250px; padding: .8rem; border-radius: 1.2rem; border: 1px solid rgba(223,193,125,.16); background: linear-gradient(180deg, rgba(22,17,14,.96), rgba(12,10,8,.96)); box-shadow: 0 18px 32px rgba(0,0,0,.28); opacity: 0; visibility: hidden; pointer-events: none; transition: opacity .2s ease, transform .22s ease, visibility 0s linear .22s;}
        .action-dock.is-open .action-panel { opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(-50%) translateX(0) scale(1); transition: opacity .2s ease, transform .22s ease, visibility 0s linear 0s; }
        .action-dock.is-open .action-trigger { opacity: 0; pointer-events: none; transform: scale(.92); }
        .action-trigger { transition: opacity .16s ease, transform .18s ease, box-shadow .18s ease; }
        .action-choice { transition: border 0.2s ease, background 0.2s ease, color 0.2s ease;display: inline-flex; align-items: center; justify-content: center; min-height: 2.7rem; padding: .55rem .8rem; border-radius: .95rem; border: 1px solid rgba(223,193,125,.14); background: rgba(255,255,255,.04); color: #eadfca; font-family: "Cinzel", serif; font-size: .68rem; letter-spacing: .07em; text-transform: uppercase; text-align: center; cursor: pointer;}
        .action-choice:hover {border: 1px solid rgba(255, 179, 0, 0.719); background: rgba(255, 255, 255, 0.845); color: #a56b00;}
        .room-settings-panel { width: min(460px, 100%); }
        .room-settings-actions { display: flex; gap: .7rem; flex-wrap: wrap; margin-top: 1.1rem; }
        .chat-author { display: block; margin-bottom: .2rem; font-family: "Cinzel", serif; font-size: .62rem; letter-spacing: .08em; text-transform: uppercase; color: #c8b89a; }
        @keyframes spiritFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-.2rem); } }
        @keyframes spiritBlink { 0%,100% { opacity: .9; transform: scale(1); } 50% { opacity: .6; transform: scale(.92); } }
        @media (max-width: 980px) { .battlefield { grid-template-columns: 1fr; } .chat-panel { display: none; } .room-stage { padding: 5.2rem .75rem 10.8rem; } .board-shell { left: 50%; width: min(100%, calc(100% - 1.5rem)); height: min(360px, calc(100% - 16rem)); top: 47%; } .player-rail { right: 1rem; width: 330px; } .player-rail.top { top: 1rem; } .player-stack { width: 215px; } .bag { left: calc(50% - 7rem); width: calc(100% - 10rem); bottom: -.2rem; height: 8.8rem; } .bag:not(.pause):hover { bottom: 1.2rem; } .action-dock { right: 1.3rem; } .action-panel { width: 220px; grid-template-columns: repeat(2, minmax(96px, 1fr)); } }
        @media (max-width: 720px) { .player-rail { right: .7rem; width: 242px; gap: .45rem; } .player-rail.top { top: .75rem; } .player-stack { width: 168px; } .player-card { min-width: 0; max-width: 168px; padding: .55rem .65rem; } .player-avatar { width: 2.8rem; height: 2.8rem; } .player-name { font-size: .82rem; } .player-subtitle { font-size: .72rem; } .spirit-wrap { width: 68px; padding: .45rem .3rem; } .spirit-sprite { width: 2.4rem; height: 2.4rem; } .score-track { min-width: 94px; } .board-shell { left: 50%; top: 45%; height: min(300px, calc(100% - 15rem)); width: calc(100% - 1.2rem); } .bag { left: calc(50% - 4.4rem); width: calc(100% - 6.4rem); bottom: .25rem; height: 8rem; } .bag:not(.pause):hover { bottom: 1.25rem; } .action-dock { right: .9rem; top: 58%; } .action-panel { width: 190px; grid-template-columns: 1fr; } }
    </style>
</head>
<body data-stone-skin="default" data-board-skin="default">
    <div class="room-shell">
        <header class="topbar compact" style="position: fixed; top: 0; left: 0; right: 0; z-index: 1200;">
            <a class="brand-mark" href="/"><img th:src="@{/logo.png}" alt="Tellstones Logo"></a>
            <div class="nav-cluster">
                <a href="/rules" class="fantasy-btn ghost">Rulebook</a>
                <a href="/" class="fantasy-btn ghost">Main Menu</a>
                <button class="icon-btn" type="button" data-open-modal="room-settings-modal" aria-label="Settings">⚙</button>
            </div>
        </header>
        <main class="battlefield">
            <aside class="chat-panel">
                <div class="chat-head">
                    <span class="eyebrow">War Table</span>
                    <h2>Chamber Chat</h2>
                    <p class="text-muted" style="margin: .35rem 0 0;">Trade bluffs, warnings, and boasts without leaving the board.</p>
                </div>
                <div class="chat-history">
                    <ul id="messages"></ul>
                    <p class="chat-empty" id="chatEmpty">No messages yet. The chamber is listening.</p>
                </div>
                <div class="chat-form">
                    <label>Message<input type="text" id="message" placeholder="Send a whisper across the table"></label>
                    <div class="chat-actions"><button type="button" class="fantasy-btn primary" id="sendChat">Send</button></div>
                </div>
            </aside>
            <section class="scene-frame room-stage">
                <div class="room-id-badge" th:text="'Chamber ' + ${roomId}">Chamber</div>
                <p style="position: absolute; left: 20px; top: -30px; font-size: 70px;" id="eventDisplay">event</p>
                <div class="playerbox"></div>
                <div class="action-dock">
                    <div class="action-panel">
                        <button type="button" class="action-choice" onclick="Place()">Place</button>
                        <button type="button" class="action-choice" onclick="Hide()">Hide</button>
                        <button type="button" class="action-choice" onclick="Swap()">Swap</button>
                        <button type="button" class="action-choice" onclick="Peek()">Peek</button>
                        <button type="button" class="action-choice" onclick="Challenge()">Challenge</button>
                        <button type="button" class="action-choice">Boast</button>
                    </div>
                    <button type="button" class="action-trigger">Act</button>
                </div>
                <div class="board-shell">
                    <div class="theline">
                        <div class="side left"></div>
                        <div class="side right"></div>
                        <div class="slots">
                            <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
                        </div>
                    </div>
                </div>
                <div class="bag" id="bag"></div>
            </section>
        </main>
    </div>

    <div id="room-settings-modal" class="modal-backdrop">
        <div class="modal-panel panel room-settings-panel">
            <button class="icon-btn close-link" type="button" data-close-modal aria-label="Close settings">✕</button>
            <div class="eyebrow">Settings</div>
            <h2 class="title-md">Battle Chamber</h2>
            <div class="field-stack" style="margin-top: 1rem;">
                <label class="field-label">
                    <span>BGM Volume</span>
                    <input data-bgm-volume type="range" min="0" max="1" step="0.05">
                </label>
            </div>
            <div class="room-settings-actions">
                <button type="button" class="fantasy-btn ghost" id="surrenderBtn">Surrender</button>
            </div>
        </div>
    </div>

    <audio data-bgm data-bgm-reset="true" loop>
        <source th:src="@{/audio/bgm.mp3}" type="audio/mpeg">
    </audio>
    <script th:src="@{/js/tellstone-ui.js}"></script>
    <script>
        async function updatebaackendline() {
            const theline = document.querySelectorAll(".slot");
            const data = [];
            for(let i = 0; i < theline.length; i++){
                if(theline[i].id === "") continue;
                data.push({position: i, stoneid: theline[i].id, turnup: theline[i].children[0].classList.contains("hiden") ? false : true});
            }
            console.log(data);
            try {
				const res = await fetch("/tellstones/settinggame", {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify(data)
				});

				if (res.ok) {
					const restone = await res.json();
                    console.log(restone);
					socket.emit("lineupdate", {roomId: productId, line: restone});
				} else {
					alert(await res.text());
				}
			} catch (err) {
				alert("Network error");
				console.error(err);
			}
        }
    </script>

            const name = player && player.displayName ? player.displayName : (player && player.username ? player.username : roleLabel);
            const subtitle = player && player.username ? "House " + player.username : "Awaiting challenger";
            return `
                <div class="spirit-wrap">
                    <div class="spirit-sprite" aria-hidden="true"></div>
                    <span class="spirit-label">Spirit</span>
                </div>
                <div class="player-stack">
                    <div class="score-track">
                        <span class="score-orb"></span>
                        <span class="score-orb"></span>
                        <span class="score-orb"></span>
                    </div>
                    <div class="player-card">

            bag.appendChild(stone);

        let stones = document.querySelectorAll(".stone");
        stones.forEach(stone => {
            stone.addEventListener("dragstart", function(e) {
                e.dataTransfer.setData("text", stone.id);
            });
        });

        const left = document.querySelector(".left");
        const right = document.querySelector(".right");
        const slots = document.querySelectorAll(".slot");

        [left, right].forEach(side => {
            side.addEventListener("dragover", e => {
                e.preventDefault();
            });
        });

        function placeStone(id, side) {
            let index;
            stones.forEach(s => {
                if(s.children.length > 0) {
                    s.children[0].classList.remove("chosen");
                }
                s.draggable = false;
            });

            const filled = [...slots].filter(s => s.children.length > 0);

            if (filled.length === 0) {
                index = Math.floor(slots.length / 2);
            } else {
                const mid = Math.floor(slots.length / 2);

                if (side === "left") {
                    for (let i = mid; i >= 0; i--) {
                        if (slots[i].children.length === 0) {
                            index = i;
                            break;
                        }
                    }
                }

                if (side === "right") {
                    for (let i = mid; i < slots.length; i++) {
                        if (slots[i].children.length === 0) {
                            index = i;
                            break;
                        }
                    }
                }
            }

            if (index === undefined) return;

            const stone = document.getElementById(id);
            const visual = stone.querySelector(".stonevisual");
            visual.classList.remove("chosen");

            slots[index].id = id;
            slots[index].appendChild(visual);
            slots[index].style.pointerEvents = "auto";
            slots[index].style.cursor = "pointer";

            stone.remove();

            updatebaackendline();
            document.getElementById("eventDisplay").innerText = "Your turn";
            if(firstturn){
                changingturns(opponent);
                return;
            } else{
                return;
            }
        }

        left.addEventListener("drop", function(e) {
            e.preventDefault();
            if(sideing === "left"){

                const id = e.dataTransfer.getData("text");

                placeStone(id, "left");
            }
        });

        right.addEventListener("drop", function(e) {
            e.preventDefault();
            if(sideing === "right"){

                const id = e.dataTransfer.getData("text");

                placeStone(id, "right");
            }
        });
    </script>

        let telldata = {};
        document.querySelectorAll(".slot").forEach(spot => {
            document.getElementById("eventDisplay").innerText = "Swap";
            spot.addEventListener("click", function(e) {
                if(swapetellnabled){
                    if(spot.children.length > 0){
                        if(spot.children[0].classList.contains("chosen")){
                            spot.children[0].classList.remove("chosen");
                            swapdata["stone" + index] = spot.id;
                            console.log(swapdata);
                            if(index == 2){
                                swapetellnabled = false;
                                socket.emit("swap", telldata);
                            }
                            index++;
                        }
                        else {
                            spot.children[0].classList.add("chosen");
                            const targetValue = spot.id;
                            for (let key in swapdata) {
                                if (user[key] === targetValue) {
                                    delete user[key];
                                }
                            }
                            index--;
                            console.log(swapdata);
                        }
                    }
                }
            })
        });
        socket.on("swapresponse", (data) => {
            console.log(data);
            swapetellnabled = true;
            telldata = data;
            document.querySelectorAll(".slot").forEach(spot => {
                if(spot.id === data.stone1 || spot.id === data.stone2){
                    if(spot.children.length > 0){
                        spot.children[0].classList.add("chosen");
                    }
                }
            })
        })

        let challenged = false;
        let challengedata = {};

        socket.on("challengecommence", (data) => {
            challengedata = data;
            document.getElementById("eventDisplay").innerText = "Write '>answer' in chat";
            document.querySelectorAll(".slot").forEach(stone => {
                if(stone.id === data.slotid){
                    if(stone.children.length > 0){
                        stone.children[0].classList.add("chosen");
                    }
                }
                challenged = true;
            })
        });

        socket.on("scorewrite", async (data) => {
            console.log(data);
            try {
				const res = await fetch("/tellstones/score", {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify(data)
				});

				if (res.ok) {
					const restone = await res.json();
                    console.log(restone);
                    document.querySelectorAll(".player-rail").forEach(zone => {
                    const orbs = zone.querySelectorAll(".score-orb");

                    orbs.forEach(orb => orb.classList.remove("lit"));

                    const name = zone.querySelector(".player-name").textContent;

                    if (name === restone.me.username) {
                        for (let i = 0; i < restone.mescore; i++) {
                            orbs[i].classList.add("lit");
                        }
                    } else {
                        for (let i = 0; i < restone.theyscore; i++) {
                            orbs[i].classList.add("lit");
                        }
                    }
                });
				} else {
					alert(await res.text());
				}
			} catch (err) {
				alert("Network error");
				console.error(err);
			}
        })
    </script>

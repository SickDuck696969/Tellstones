<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.4.0/socket.io.js"></script>
    <link rel="stylesheet" th:href="@{/css/tellstone-fantasy.css}">
    <title>Game</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            flex-direction: column;
            overflow: hidden;
        }

        .theline {
            background-image: url('/textu/360_F_166099507_4puS6NXaWOPugMfxcvkpVH4h8XwuhYXb.png');
            height: 250px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.6);
        }

        /* LEFT / RIGHT DROP AREAS */
        .side {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
        }

        .left {
            left: 0;
        }

        .right {
            right: 0;
        }

        /* SLOTS */
        .slots {
            display: flex;
            gap: 100px;
            width: 100%;
            align-items: center;
            justify-content: center;
        }

        .slot {
            width: 80px;
            height: 80px;
            border: 2px dashed white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            pointer-events:none;
        }

        /* BAG */
        .bag {
            display: flex;
            width: 100%;
            align-items: top;
            justify-content: center;
            gap: 5px;
            position: absolute;
            bottom: -120px;
            height: 200px;
            transition: gap .3s ease, bottom .3s ease;
        }

        .bag:not(.pause):hover {
            bottom: 10px;
            gap: 40px;
        }

        .bag.pause {
            user-select: none;
        }

        .stone {
            display: flex;
            width: 150px;
            height: 150px;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: grab;
        }

        .stone.pause {
            user-select: none;
        }

        .stone:not(.pause):hover .stonevisual {
            height: 170px;
            width: 170px;
            margin-bottom: 30px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
        }

        .stonevisual {
            position: absolute;
            background: #333;
            border-radius: 50%;
            height: 150px;
            width: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 5px 5px 20px rgba(0, 0, 0, 0.4);
            transition: height .3s, width .3s, margin-bottom .2s, box-shadow .3s;
            color: white;
            font-size: 30px;
        }

        .startbutton {
            position: absolute;
            bottom: 40px;
            z-index: 10;
            height: 100px;
            width: 300px;
            outline: none;
            border: none;
            background-color: yellowgreen;
            font-size: large;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.1s ease, color 0.1s ease;
        }

        .startbutton:hover {
            background-color: rgb(160, 223, 35);
            transform: scale(1.05);
            color: white;
        }

        .playerbox {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            
            width: fit-content;
            height: fit-content;

            z-index: 1000;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transform: gap 0.1s ease;
        }

        .playerbox:hover{
            gap: 10px;
        }

        .playericon {
            display: flex;
            width: 100px;
            height: 100px;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .playericon:hover .playericonvisual{
            transform: translateY(20px);
        }

        .playericonvisual {
            background: #333;
            border-radius: 50%;
            height: 100px;
            width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: height .3s, width .3s, margin-bottom .2s, box-shadow .3s;
            color: white;
            font-size: 20px;
            transition: transform 0.1s ease;
            cursor: pointer;
        }
    </style>
    <p th:id="${roomId}" th:text="'room: ' + ${roomId}" style="position: fixed; top: 0; left: 0; margin: 10px">></p>
</head>

<body>
    <header class="topbar compact" style="position: fixed; top: 0; left: 0; right: 0; z-index: 1200;">
        <a class="brand-mark" href="/">
            <img th:src="@{/logo.png}" alt="Tellstones Logo">
        </a>
        <div class="nav-cluster">
            <a href="/rules" class="fantasy-btn ghost">Rulebook</a>
            <a href="/play" class="fantasy-btn ghost">Room Hall</a>
            <a href="/" class="fantasy-btn ghost">Main Menu</a>
        </div>
    </header>
    <div class="playerbox"></div>
    <div class="theline">
        <div class="side left"></div>
        <div class="side right"></div>

        <div class="slots">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
        </div>
    </div>
    <button id="bagBtn" class="startbutton">
        Click me to start the game
    </button>
    <div class="bag pause" id="bag"></div>
    <audio data-bgm data-bgm-reset="true" loop>
        <source th:src="@{/audio/bgm.mp3}" type="audio/mpeg">
    </audio>
    <script th:src="@{/js/tellstone-ui.js}"></script>
    <script>
        async function updatebaackendline() {
            const theline = document.querySelectorAll(".slot .stonevisual");
            const data = [];
            for(let i = 0; i < theline.length; i++){
                data.push({position: i, stoneid: theline[i].textContent})
            }
            try {
				const res = await fetch("/tellstones/settinggame", {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify(data)
				});

				if (res.ok) {
					const restone = await res.json();
					alert(JSON.stringify(restone));
				} else {
					alert(await res.text());
				}
			} catch (err) {
				alert("Network error");
				console.error(err);
			}
        }
    </script>

<script>
    let isSocketConnected = false;
    const socket = io("http://localhost:9092", {
        transports: ["websocket"]
    });

    socket.on("connect", () => {
        inRoom();
        console.log("CONNECTED");
    });

    socket.on("Youin", async () => {
        await loadProduct();
        spawnplayer();
    });

    socket.on("connect_error", (err) => {
        console.log("ERROR:", err);
    });

    socket.on("message", (data) => {
        const li = document.createElement("li");
        li.innerText = data;
        document.getElementById("messages").appendChild(li);
    });

    socket.on("gamestart", () => {
        document.getElementById("bagBtn").style.display = "none";
        bag.classList.remove("pause");

        document.querySelectorAll(".stone").forEach(stone => {
            stone.classList.remove("pause");
            stone.draggable = true;
        });
    });

    let data = [];

    socket.on("roomJoined", (roomId) => {
        console.log("Joined room:", roomId);
        window.location.href = `/tellstones/room/${roomId}`;
    });

    function startRoom() {
        const roomId = document.getElementById("roomId").value;
        socket.emit("startRoom", roomId);
        console.log("Started room:", roomId);
    }

    function inRoom() {
        const roomId = productId;
        socket.emit("inRoom", roomId);
        console.log("In room:", roomId);
    }

    function sendMessage() {
        const msg = document.getElementById("message").value;
        socket.emit("message", msg);
    }

    function sendMessage() {
        socket.emit('leaveRoom', productId);
    }

    socket.on("outthedoor", async () => {
        await loadProduct();
        spawnplayer();
    });
</script>
    <script>
        let players = [];
        let productId = window.location.pathname.split("/")[window.location.pathname.split("/").length - 2];
        async function loadProduct() {
            try {
                const res = await fetch("/tellstones/getplayers/" + productId);
                players = await res.json();

                console.log(players);
 
            } catch (err) {
                console.error("Error loading players:", err);
            }
        }
    </script>
    <script>
        async function spawnplayer() {
            const playerbox = document.querySelector(".playerbox");
            playerbox.innerHTML = "";
            players.forEach(player => {
                const icon = document.createElement("div");

                icon.className = "playericon";
                
                icon.id = player.id;
                if(player.id.toString() === window.location.pathname.split("/").pop()){
                    icon.innerHTML = `<div class="playericonvisual" style="background-color: red">${player.username}</div>`;
                } else {
                    icon.innerHTML = `<div class="playericonvisual">${player.username}</div>`;
                }
                

                icon.draggable = false;

                playerbox.appendChild(icon);
            });
        }
    </script>
    <script>
        const bag = document.getElementById("bag");
        let who = null;

        for (let i = 2; i <= 8; i++) {
            const stone = document.createElement("div");
            stone.className = "stone pause";
            stone.draggable = true;
            stone.id = i;

            stone.innerHTML = `<div class="stonevisual">${i}</div>`;

            stone.draggable = false;

            bag.appendChild(stone);
        }

        const stones = document.querySelectorAll(".stone");
        stones.forEach(stone => {
            stone.addEventListener("dragstart", function(e) {
                e.dataTransfer.setData("text", stone.id);
            });
        });

        const left = document.querySelector(".left");
        const right = document.querySelector(".right");
        const slots = document.querySelectorAll(".slot");

        [left, right].forEach(side => {
            side.addEventListener("dragover", e => e.preventDefault());
        });

        function placeStone(id, side) {
            let index;

            const filled = [...slots].filter(s => s.children.length > 0);

            if (filled.length === 0) {
                index = Math.floor(slots.length / 2);
            } else {
                const mid = Math.floor(slots.length / 2);

                if (side === "left") {
                    for (let i = mid; i >= 0; i--) {
                        if (slots[i].children.length === 0) {
                            index = i;
                            break;
                        }
                    }
                }

                if (side === "right") {
                    for (let i = mid; i < slots.length; i++) {
                        if (slots[i].children.length === 0) {
                            index = i;
                            break;
                        }
                    }
                }
            }

            if (index === undefined) return;

            const stone = document.getElementById(id);
            const visual = stone.querySelector(".stonevisual");

            slots[index].appendChild(visual);

            stone.remove();
            updatebaackendline();
        }

        left.addEventListener("drop", function(e) {
            e.preventDefault();

            const id = e.dataTransfer.getData("text");

            socket.emit("callstone", id, "left", who);
        });

        right.addEventListener("drop", function(e) {
            e.preventDefault();

            const id = e.dataTransfer.getData("text");

            socket.emit("callstone", id, "right", who);
        });
    </script>
    <script>
        document.getElementById("bagBtn").addEventListener("click", function() {
            if(players.length >= 2){
                socket.emit("startgame", productId);
            }
        });
    </script>
</body>
</html>

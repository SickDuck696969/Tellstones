<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org" 
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
layout:decorate="~{layout}"> 
<head> 
<title>Update Product</title> 
<link rel="stylesheet" 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"> 
</head> 
<body> 
<section layout:fragment="content" class="container mt-5"> 
<h1>Edit Product</h1> 
<form th:action="@{/products/update/{id}(id=${product.id})}" 
th:object="${product}" method="post" class="needs-validation" novalidate enctype="multipart/form-data"> 
<div class="mb-3"> 
<label for="name" class="form-label">Name:</label> 
<input type="text" th:field="*{name}" class="form-control" id="name" 
required> 
<div class="text-danger" th:if="${#fields.hasErrors('name')}" 
th:errors="*{name}"></div> 
</div> 
<div class="mb-3"> 
<label for="price" class="form-label">Price:</label> 
<input type="text" th:field="*{price}" class="form-control" id="price" 
required> 
</div> 
<div class="mb-3"> 
<label for="category" class="form-label">Category:</label> 
<select th:field="*{category}" class="form-control" id="category"> 
<option th:each="category : ${categories}" 
th:value="${category.id}" th:text="${category.name}" th:selected="${category.id == 
product.category.id}"></option> 
</select> 
</div> 
<div class="mb-3"> 
<label for="description" class="form-label">Description:</label> 
<textarea th:field="*{description}" class="form-control" 
id="description" required></textarea> 
</div>
<div class="mb-3">
    <label for="image_string" class="form-label">Product Image</label>
    <input type="file"
           class="form-control"
           id="image_string"
           name="image"
           accept="image/*">
</div>
<div>
    <div id="imagePreview" style="width: 200px; height: 200px; border: 1px solid #ccc; background-size: contain; background-position: center; background-repeat: no-repeat;">
        Image Preview
    </div>
</div>
<button type="submit" class="btn btn-primary">Save Changes</button> 
<a th:href="@{/products}" class="btn btn-link">Cancel</a> 
</form> 
</section> 
<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
<script>
document.getElementById('image_string').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
        document.getElementById('imagePreview').style.backgroundImage =
            `url(${e.target.result})`;
    };
    reader.readAsDataURL(file);
});
</script>
</body> 
</html>
